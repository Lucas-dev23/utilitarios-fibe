<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIBE - Utilitários</title>
    <link rel="icon" type="image/png" href="../../icon-fibe.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg sticky-top shadow-lg py-3"
        style="background: linear-gradient(90deg,#16a34a,#2563eb);">

        <div class="container">

            <a class="navbar-brand text-white fw-bold" href="../../index.html">
                Faculdade IBE
            </a>

            <!-- Botão mobile -->
            <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarMenu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <!-- Menu -->
            <div class="collapse navbar-collapse justify-content-end" id="navbarMenu">

                <ul class="navbar-nav ms-auto align-items-center gap-2">

                    <!-- Início -->
                    <li class="nav-item">
                        <a class="nav-link text-white fw-semibold px-3" href="../../index.html">
                            <i class="bi bi-house-door me-1"></i>
                            Início
                        </a>
                    </li>

                    <!-- Dropdown Utilitários -->
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle text-white fw-semibold px-3" href="#" role="button"
                            data-bs-toggle="dropdown">
                            <i class="bi bi-tools me-1"></i>
                            Utilitários
                        </a>

                        <ul class="dropdown-menu dropdown-menu-end">

                            <li>
                                <a class="dropdown-item" href="../pages/dependencia.html">
                                    <i class="bi bi-calculator me-2"></i>
                                    Dependência
                                </a>
                            </li>

                            <li>
                                <a class="dropdown-item" href="../pages/eliminacao.html">
                                    <i class="bi bi-graph-up me-2"></i>
                                    Aproveitamento
                                </a>
                            </li>

                            <li>
                                <a class="dropdown-item" href="../pages/renegociacao.html">
                                    <i class="bi bi-cash-coin me-2"></i>
                                    Renegociação
                                </a>
                            </li>

                        </ul>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- Notificação -->
    <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

    <div class="container py-5" style="max-width:700px;">

        <div class="card shadow-lg">

            <div class="card-body">

                <h3 class="m-1">Calculadora de Renegociação</h3>
                <hr class="mb-4">

                <form id="formRenegociacao">

                    <div class="row">

                        <!-- Curso -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Curso</label>
                            <select class="form-select" id="curso" name="curso" >
                                <option value="">Selecione o curso</option>
                            </select>
                        </div>

                        <!-- Dívida -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Valor da dívida</label>
                            <div class="input-group">
                                <span class="input-group-text">R$</span>
                                <input type="number" step="0.01" id="divida" name="divida" class="form-control" placeholder="0.00" >
                            </div>
                        </div>

                        <!-- Desconto -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Desconto (%)</label>
                            <input type="number" id="percentualDescAluno" name="percentualDescAluno" class="form-control" placeholder="Ex: 15"
                                value="15" >
                        </div>

                        <!-- Parcelas -->
                        <div class="col-md-6 mb-3 position-relative">
                            <label class="form-label">Parcelas</label>

                            <div class="form-control d-flex justify-content-between align-items-center"
                                id="campoParcelas" style="cursor:pointer;">
                                <span>Selecione...</span>
                                <span>▼</span>
                            </div>

                            <div id="dropdownParcelas"
                                class="border rounded p-2 bg-white position-absolute d-none w-100 shadow"
                                style="z-index: 1000; max-height: 200px; overflow-y: auto;">
                            </div>
                        </div>

                    </div>

                    <!-- Botão calcular -->
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        Calcular
                    </button>

                </form>
                
                <!-- Resultado -->
                <div class="mt-4 alert alert-success" id="resultado" style="display: none;">

                    <h5 class="fw-bold mb-3">Resultado</h5>

                    <ul class="list-group mb-3"></ul>

                    <!-- Botão copiar -->
                    <button id="copiarMensagem" class="btn btn-success w-100">
                        📋 Copiar mensagem
                    </button>

                </div>

            </div>

        </div>

        <script type="module" src="../services/calculoRenegociacao.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
