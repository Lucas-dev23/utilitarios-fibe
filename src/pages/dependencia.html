<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIBE - Utilitários</title>
    <link rel="icon" type="image/png" href="../../icon-fibe.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-expand-lg sticky-top shadow-lg py-3"
        style="background: linear-gradient(90deg,#16a34a,#2563eb);">

        <div class="container">

            <a class="navbar-brand text-white fw-bold" href="../../index.html">
                Faculdade IBE
            </a>

            <!-- Botão mobile -->
            <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarMenu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <!-- Menu -->
            <div class="collapse navbar-collapse justify-content-end" id="navbarMenu">

                <ul class="navbar-nav ms-auto gap-2">

                    <li class="nav-item">
                        <a class="nav-link text-white fw-semibold px-3 rounded nav-hover" href="../../index.html">
                            <i class="bi bi-house-door me-1"></i>
                            Início
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white fw-semibold px-3 rounded nav-hover"
                            href="../pages/dependencia.html">
                            <i class="bi bi-calculator me-1"></i>
                            Calcular Dependência
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white fw-semibold px-3 rounded nav-hover"
                            href="../pages/eliminacao.html">
                            <i class="bi bi-graph-up me-1"></i>
                            Calcular Aproveitamento
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <div class="container py-5" style="max-width:700px;">

        <div class="card shadow-lg">

            <div class="card-body">

                <h3 class="m-1">Calculadora de Dependência</h3>
                <hr class="mb-4">

                <div class="mb-3">

                    <label class="form-label">Período</label>

                    <select class="form-select" id="periodo" required>
                        <option value="">Selecione o período</option>
                        <option value="1">1º Período</option>
                        <option value="2">2º Período</option>
                        <option value="3">3º Período</option>
                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">Disciplinas</label>

                    <div id="listaDisciplinas" class="border rounded p-3 bg-light"
                        style="max-height:180px; overflow-y:auto;">
                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Semestralidade</label>
                        <input type="number" id="semestralidade" class="form-control" value="3054.00" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Parcelamento</label>
                        <input type="number" id="parcelamento" class="form-control" value="6" required>
                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Mensalidade do aluno</label>
                        <input type="number" id="mensalidadeAluno" class="form-control" placeholder="Ex: 254.60"
                            required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Desconto (%)</label>
                        <input type="number" id="percentualDescAluno" class="form-control" placeholder="Ex: 60"
                            required>
                    </div>

                </div>

                <button class="btn btn-primary w-100" id="btnCalcular">
                    Calcular
                </button>

                <div class="mt-4 alert alert-success" id="resultado" style="display: none;">

                    <h5 class="fw-bold mb-3">Resultado</h5>

                    <ul class="list-group">

                        <li class="list-group-item" id="resPeriodo"></li>
                        <li class="list-group-item" id="resDisciplinas"></li>
                        <li class="list-group-item" id="resHoraAula"></li>
                        <li class="list-group-item" id="resParcelaDp"></li>
                        <li class="list-group-item" id="resNovaMensalidade"></li>
                        <li class="list-group-item" id="resSemDesconto"></li>

                    </ul>

                </div>

            </div>

        </div>

    </div>

    <script type="module" src="../services/calculoDependencia.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
