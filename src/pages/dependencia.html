<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIBE - Utilitários</title>
    <link rel="icon" type="image/png" href="../../icon-fibe.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-expand-lg sticky-top shadow-lg py-3"
        style="background: linear-gradient(90deg,#16a34a,#2563eb);">

        <div class="container">

            <a class="navbar-brand text-white fw-bold" href="../../index.html">
                Faculdade IBE
            </a>

            <!-- Botão mobile -->
            <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarMenu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <!-- Menu -->
            <div class="collapse navbar-collapse justify-content-end" id="navbarMenu">

                <ul class="navbar-nav ms-auto align-items-center gap-2">

                    <!-- Início -->
                    <li class="nav-item">
                        <a class="nav-link text-white fw-semibold px-3" href="../../index.html">
                            <i class="bi bi-house-door me-1"></i>
                            Início
                        </a>
                    </li>

                    <!-- Dropdown Utilitários -->
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle text-white fw-semibold px-3" href="#" role="button"
                            data-bs-toggle="dropdown">
                            <i class="bi bi-tools me-1"></i>
                            Utilitários
                        </a>

                        <ul class="dropdown-menu dropdown-menu-end">

                            <li>
                                <a class="dropdown-item" href="../pages/dependencia.html">
                                    <i class="bi bi-calculator me-2"></i>
                                    Dependência
                                </a>
                            </li>

                            <li>
                                <a class="dropdown-item" href="../pages/eliminacao.html">
                                    <i class="bi bi-graph-up me-2"></i>
                                    Aproveitamento
                                </a>
                            </li>

                            <li>
                                <a class="dropdown-item" href="../pages/renegociacao.html">
                                    <i class="bi bi-cash-coin me-2"></i>
                                    Renegociação
                                </a>
                            </li>

                        </ul>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- Notificação -->
    <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

    <div class="container py-5" style="max-width:700px;">

        <div class="card shadow-lg">

            <div class="card-body">

                <h3 class="m-1">Calculadora de Dependência</h3>
                <hr class="mb-4">

                <form id="formDependencia">

                    <div class="row">

                        <div class="mb-3">

                            <label class="form-label">Período</label>

                            <select class="form-select" id="periodo" name="periodo" >
                                <option value="">Selecione o período</option>
                            </select>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">Disciplinas</label>

                            <div id="listaDisciplinas" class="border rounded p-3 bg-light"
                                style="max-height:180px; overflow-y:auto;">
                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Semestralidade</label>
                                <div class="input-group">
                                    <span class="input-group-text">R$</span>
                                    <input type="number" step="0.01" id="semestralidade" name="semestralidade" class="form-control" value="3054.00">
                                </div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Parcelamento</label>
                                <input type="number" id="parcelamento" name="parcelamento" class="form-control" value="6" >
                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Mensalidade do aluno</label>
                                <input type="number" step="0.01" id="mensalidadeAluno" name="mensalidadeAluno" class="form-control" placeholder="Ex: 254.60"
                                    >
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Desconto (%)</label>
                                <input type="number" id="percentualDescAluno" name="percentualDescAluno" class="form-control" placeholder="Ex: 60">
                            </div>

                        </div>

                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        Calcular
                    </button>

                </form>

                <div class="mt-4 alert alert-success" id="resultado" style="display: none;">

                    <h5 class="fw-bold mb-3">Resultado</h5>

                    <ul class="list-group">

                        <li class="list-group-item" id="resPeriodo"></li>
                        <li class="list-group-item" id="resDisciplinas"></li>
                        <li class="list-group-item" id="resHoraAula"></li>
                        <li class="list-group-item" id="resParcelaDp"></li>
                        <li class="list-group-item" id="resNovaMensalidade"></li>
                        <li class="list-group-item" id="resSemDesconto"></li>

                    </ul>

                </div>

            </div>

        </div>

    </div>

    <script type="module" src="../services/calculoDependencia.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
